<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Learning Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Poppins;background:#eef;margin:0}
nav{background:#fff;padding:10px;text-align:center}
nav a{margin:10px;cursor:pointer;color:#0077ff;font-weight:bold}
section{display:none;padding:20px}
.active{display:block}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px}
button{padding:8px 15px;margin:5px;background:#0077ff;color:#fff;border:none;border-radius:5px;cursor:pointer}
input{padding:8px;margin:5px;width:200px}
img,iframe{width:100%;margin-top:10px;border-radius:8px}
#chatBox{height:200px;overflow:auto;border:1px solid #ccc;padding:10px}
</style>
</head>

<body>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('login')">Login</a>
<a onclick="show('explore')">Explore</a>
<a onclick="show('quiz')">Quiz</a>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('chatbot')">Help AI</a>
<a onclick="logout()">Logout</a>
</nav>

<section id="home" class="active">
<h2>ML Learning Platform</h2>
<div class="card">Learn ML with visuals, quizzes & AI help</div>
<button onclick="show('login')">Start</button>
</section>

<section id="login">
<h2>Login / Signup</h2>
<input id="user"><br>
<input id="pass"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="msg"></p>
</section>

<section id="explore">
<h2>Levels</h2>
<div id="levels"></div>
<div class="card" id="content"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</section>

<section id="quiz">
<h2>Quiz</h2>
<div class="card" id="quizBox"></div>
<button onclick="nextQ()">Next</button>
</section>

<section id="dashboard">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</section>

<section id="chatbot">
<h2>AI Help</h2>
<div class="card">
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>
</section>

<script>
let currentUser=sessionStorage.getItem("user");
let progress=JSON.parse(localStorage.getItem("progress"))||{};
let scoreData=JSON.parse(localStorage.getItem("score"))||{};
let currentLevel=0,currentQ=0,chartInstance=null;

// NAV
function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="explore"){if(!currentUser){alert("Login first");show('login');return;}renderLevels();}
if(id==="quiz"){renderQuiz();}
if(id==="dashboard"){renderChart();}
}

// AUTH
function signup(){
let u=user.value,p=pass.value;
let users=JSON.parse(localStorage.getItem("users"))||{};
users[u]=p;
localStorage.setItem("users",JSON.stringify(users));
msg.innerText="Signup done";
}

function login(){
let u=user.value,p=pass.value;
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[u]===p){
currentUser=u;
sessionStorage.setItem("user",u);
show('explore');
}else msg.innerText="Wrong";
}

function logout(){
sessionStorage.clear();
currentUser=null;
show('login');
}

// LEVELS (FIXED MEDIA)
const levelsDiv=document.getElementById("levels");

const levels=[
{
title:"ML Basics",
content:`<h3>Machine Learning</h3>
<p>ML allows systems to learn from data.</p>
<img src="https://images.unsplash.com/photo-1581091870622-1e7e4c0b2b4b">
<iframe src="https://www.youtube.com/embed/ukzFI9rgwfU" allowfullscreen></iframe>`
},

{
title:"Types of ML",
content:`<p>Supervised, Unsupervised, Reinforcement</p>
<img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
<iframe src="https://www.youtube.com/embed/Cr6VqTRO1v0" allowfullscreen></iframe>`
},

{
title:"Linear Regression",
content:`<p>y = mx + b</p>
<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<iframe src="https://www.youtube.com/embed/nk2CQITm_eo" allowfullscreen></iframe>`
},

{
title:"Logistic Regression",
content:`<p>Classification model</p>
<img src="https://images.unsplash.com/photo-1559526324-593bc073d938">
<iframe src="https://www.youtube.com/embed/zM4VZR0px8E" allowfullscreen></iframe>`
},

{
title:"Evaluation",
content:`<p>Accuracy, Precision, Recall</p>
<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">`
},

{
title:"Overfitting",
content:`<p>Overfitting vs Underfitting</p>
<img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">`
},

{
title:"Feature Engineering",
content:`<p>Transform raw data</p>
<img src="https://images.unsplash.com/photo-1581091215367-59ab6b8f90c8">`
},

{
title:"Clustering",
content:`<p>K-means grouping</p>
<img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31">`
},

{
title:"Neural Networks",
content:`<p>Brain-inspired model</p>
<img src="https://images.unsplash.com/photo-1508385082359-f38ae991e8f2">`
},

{
title:"Deep Learning",
content:`<p>Advanced neural networks</p>
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">`
}
];

function renderLevels(){
levelsDiv.innerHTML="";
levels.forEach((l,i)=>{
let b=document.createElement("button");
b.innerText=l.title;
b.onclick=()=>{currentLevel=i;showLevel();}
levelsDiv.appendChild(b);
});
showLevel();
}

function showLevel(){
content.innerHTML=levels[currentLevel].content;
if(!progress[currentUser]) progress[currentUser]=[];
if(!progress[currentUser].includes(currentLevel))
progress[currentUser].push(currentLevel);
localStorage.setItem("progress",JSON.stringify(progress));
}

function next(){if(currentLevel<9){currentLevel++;showLevel();}}
function prev(){if(currentLevel>0){currentLevel--;showLevel();}}

// QUIZ
const quiz=[
{q:"ML stands for?",o:["Machine Learning","Mega Logic"],a:0},
{q:"Supervised uses?",o:["Labeled","Random"],a:0},
{q:"Regression predicts?",o:["Number","Class"],a:0},
{q:"Clustering?",o:["Supervised","Unsupervised"],a:1},
{q:"Overfitting?",o:["Memorizing","Learning"],a:0},
{q:"Spam detection?",o:["Classification","Regression"],a:0},
{q:"K-means?",o:["Clustering","Sorting"],a:0},
{q:"Neural nets?",o:["Brain","CPU"],a:0},
{q:"Accuracy?",o:["Correct","Speed"],a:0},
{q:"Deep learning?",o:["Neural nets","Trees"],a:0}
];

function renderQuiz(){
let q=quiz[currentQ];
quizBox.innerHTML=`<h3>${q.q}</h3>`;
q.o.forEach((opt,i)=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>{
alert(i===q.a?"Correct":"Wrong");
};
quizBox.appendChild(b);
});
}

function nextQ(){
if(currentQ<quiz.length-1){currentQ++;renderQuiz();}
else{alert("Quiz done");currentQ=0;}
}

// DASHBOARD
function renderChart(){
let done=progress[currentUser]?progress[currentUser].length:0;
let ctx=document.getElementById("chart");

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(ctx,{
type:'bar',
data:{labels:["Levels Completed"],datasets:[{data:[done]}]}
});
}

// CHATBOT
function sendMsg(){
let input=chatInput.value.toLowerCase();
let reply="Try ML topics";

if(input.includes("ml")) reply="ML learns from data.";
if(input.includes("regression")) reply="Predicts values.";

chatBox.innerHTML+=`<p><b>You:</b> ${input}</p>`;
chatBox.innerHTML+=`<p><b>AI:</b> ${reply}</p>`;
chatInput.value="";
}
</script>

</body>
</html>

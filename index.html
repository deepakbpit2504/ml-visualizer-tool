<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Learning Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Poppins;background:#eef;margin:0}
nav{background:#fff;padding:10px;text-align:center}
nav a{margin:10px;cursor:pointer;color:#0077ff;font-weight:bold}
section{display:none;padding:20px}
.active{display:block}

.card{
background:#fff;
padding:15px;
border-radius:10px;
margin:10px;
}

.split{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.left,.right{
flex:1;
min-width:280px;
}

img{
width:100%;
border-radius:10px;
}

iframe{
width:100%;
height:250px;
border:none;
border-radius:10px;
}

button{
padding:8px 15px;
margin:5px;
background:#0077ff;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
width:200px;
}

#chatBox{
height:200px;
overflow:auto;
border:1px solid #ccc;
padding:10px;
}
</style>
</head>

<body>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('login')">Login</a>
<a onclick="show('explore')">Explore</a>
<a onclick="show('quiz')">Quiz</a>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('chatbot')">Help AI</a>
<a onclick="logout()">Logout</a>
</nav>

<section id="home" class="active">
<h2>ML Learning Platform</h2>
<div class="card">Learn ML step-by-step with visuals and videos</div>
<button onclick="show('login')">Start</button>
</section>

<section id="login">
<h2>Login / Signup</h2>
<input id="user"><br>
<input id="pass"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="msg"></p>
</section>

<section id="explore">
<h2>Levels</h2>
<div id="levels"></div>
<div class="card" id="content"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</section>

<section id="quiz">
<h2>Quiz</h2>
<div class="card" id="quizBox"></div>
<button onclick="nextQ()">Next</button>
</section>

<section id="dashboard">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</section>

<section id="chatbot">
<h2>AI Help</h2>
<div class="card">
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>
</section>

<script>

let currentUser=sessionStorage.getItem("user");
let progress=JSON.parse(localStorage.getItem("progress"))||{};
let currentLevel=0,currentQ=0,chartInstance=null;

// NAV
function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="explore"){if(!currentUser){alert("Login first");show('login');return;}renderLevels();}
if(id==="quiz"){renderQuiz();}
if(id==="dashboard"){renderChart();}
}

// AUTH
function signup(){
let users=JSON.parse(localStorage.getItem("users"))||{};
users[user.value]=pass.value;
localStorage.setItem("users",JSON.stringify(users));
msg.innerText="Signup done";
}

function login(){
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[user.value]===pass.value){
currentUser=user.value;
sessionStorage.setItem("user",user.value);
show('explore');
}else msg.innerText="Wrong";
}

function logout(){
sessionStorage.clear();
currentUser=null;
show('login');
}

// LEVELS (STABLE)
const levelsDiv=document.getElementById("levels");

const levels=[

{
title:"1. Introduction to ML",
content:`
<p>Machine Learning allows systems to learn from data.</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Machine+Learning">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/ukzFI9rgwfU"></iframe>
</div>
</div>`
},

{
title:"2. Types of ML",
content:`
<p>Supervised, Unsupervised, Reinforcement</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Types+of+ML">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/Cr6VqTRO1v0"></iframe>
</div>
</div>`
},

{
title:"3. Linear Regression",
content:`
<p>y = mx + b</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Linear+Regression">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/nk2CQITm_eo"></iframe>
</div>
</div>`
},

{
title:"4. Logistic Regression",
content:`
<p>Classification model</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Logistic+Regression">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/zM4VZR0px8E"></iframe>
</div>
</div>`
},

{
title:"5. Evaluation Metrics",
content:`
<p>Accuracy, Precision, Recall</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Evaluation+Metrics">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/85dtiMz9tSo"></iframe>
</div>
</div>`
},

{
title:"6. Overfitting",
content:`
<p>Overfitting vs Underfitting</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Overfitting">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/EehRcPo1WPs"></iframe>
</div>
</div>`
},

{
title:"7. Clustering",
content:`
<p>K-means clustering</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Clustering">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/4b5d3muPQmA"></iframe>
</div>
</div>`
},

{
title:"8. Neural Networks",
content:`
<p>Brain-inspired models</p>
<div class="split">
<div class="left">
<img src="https://via.placeholder.com/500x300?text=Neural+Network">
</div>
<div class="right">
<iframe src="https://www.youtube.com/embed/aircAruvnKk"></iframe>
</div>
</div>`
}

];

function renderLevels(){
levelsDiv.innerHTML="";
levels.forEach((l,i)=>{
let b=document.createElement("button");
b.innerText=l.title;
b.onclick=()=>{currentLevel=i;showLevel();}
levelsDiv.appendChild(b);
});
showLevel();
}

function showLevel(){
content.innerHTML=levels[currentLevel].content;
if(!progress[currentUser]) progress[currentUser]=[];
if(!progress[currentUser].includes(currentLevel))
progress[currentUser].push(currentLevel);
localStorage.setItem("progress",JSON.stringify(progress));
}

function next(){if(currentLevel<7){currentLevel++;showLevel();}}
function prev(){if(currentLevel>0){currentLevel--;showLevel();}}

// QUIZ
const quiz=[
{q:"ML stands for?",o:["Machine Learning","Mega Logic"],a:0},
{q:"Supervised uses?",o:["Labeled","Random"],a:0},
{q:"Regression predicts?",o:["Number","Class"],a:0},
{q:"Clustering?",o:["Supervised","Unsupervised"],a:1},
{q:"Overfitting?",o:["Memorizing","Learning"],a:0}
];

function renderQuiz(){
let q=quiz[currentQ];
quizBox.innerHTML=`<h3>${q.q}</h3>`;
q.o.forEach((opt,i)=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>alert(i===q.a?"Correct":"Wrong");
quizBox.appendChild(b);
});
}

function nextQ(){
if(currentQ<quiz.length-1){currentQ++;renderQuiz();}
else{alert("Quiz done");currentQ=0;}
}

// DASHBOARD
function renderChart(){
let done=progress[currentUser]?progress[currentUser].length:0;
let ctx=document.getElementById("chart");

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(ctx,{
type:'bar',
data:{labels:["Levels Completed"],datasets:[{data:[done]}]}
});
}

// CHATBOT
function sendMsg(){
let input=chatInput.value.toLowerCase();
let reply="Ask about ML";

if(input.includes("ml")) reply="ML learns from data.";
if(input.includes("regression")) reply="Regression predicts values.";

chatBox.innerHTML+=`<p><b>You:</b> ${input}</p>`;
chatBox.innerHTML+=`<p><b>AI:</b> ${reply}</p>`;
chatInput.value="";
}

</script>

</body>
</html>

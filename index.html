<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Learning Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background: linear-gradient(135deg,#f0f4ff,#e0f7fa); color:#111;}
nav{display:flex;justify-content:center;gap:15px;background:#fff;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
nav a{cursor:pointer;color:#0077ff;font-weight:600;}
section{display:none;padding:25px;}
.active{display:block;}
h1{text-align:center;margin-bottom:20px;}
.card{background:#fff;padding:20px;border-radius:12px;margin:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
button{padding:10px 20px;background:#0077ff;color:#fff;border:none;border-radius:5px;cursor:pointer;margin:5px;}
input[type=text], input[type=password]{width:100%;padding:10px;margin:5px 0 15px 0;border-radius:5px;border:1px solid #ccc;}
.level-button{padding:10px 15px;margin:5px;background:#e0f7fa;border:none;border-radius:5px;cursor:pointer;}
.level-button.completed{background:#0077ff;color:#fff;}
#dashboardChart{max-width:600px;margin:20px auto;}
</style>
</head>
<body>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('login')">Login/Signup</a>
<a onclick="show('explore')">Explore</a>
<a onclick="show('practice')">Practice</a>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="logout()">Logout</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h1>Welcome to ML Learning Platform</h1>
<div class="card">
Learn Machine Learning from basics to advanced with 25 structured levels, practice quizzes, and track your progress visually.
</div>
<button onclick="show('login')">Get Started</button>
</section>

<!-- LOGIN/SIGNUP -->
<section id="login">
<h1>Login / Signup</h1>
<div class="card">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>
</section>

<!-- EXPLORE -->
<section id="explore">
<h1>Explore ML Levels</h1>
<div class="card" id="levelsContainer"></div>
<div class="card" id="levelContent"></div>
<button onclick="prevLevel()">Previous</button>
<button onclick="nextLevel()">Next</button>
</section>

<!-- PRACTICE -->
<section id="practice">
<h1>Practice Questions</h1>
<div class="card" id="practiceContent"></div>
<button onclick="prevPractice()">Previous</button>
<button onclick="nextPractice()">Next</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h1>Progress Dashboard</h1>
<div class="card">
<canvas id="dashboardChart" width="600" height="400"></canvas>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// --- SESSION ---
let currentUser = sessionStorage.getItem("currentUser");
let progress = JSON.parse(localStorage.getItem("progress")) || {};

// --- NAVIGATION ---
function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="explore") renderLevels();
if(id==="dashboard") renderDashboard();
if(id==="practice") renderPractice();
}

// --- LOGIN/SIGNUP ---
function signup(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;
if(!user||!pass){document.getElementById("loginMsg").innerText="Fill all fields"; return;}
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[user]){document.getElementById("loginMsg").innerText="User exists"; return;}
users[user]=pass;
localStorage.setItem("users", JSON.stringify(users));
document.getElementById("loginMsg").innerText="Signup successful. Login now.";
}

function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[user] && users[user]===pass){
currentUser=user;
sessionStorage.setItem("currentUser", user);
document.getElementById("loginMsg").innerText="Login successful";
show('explore');
}else{
document.getElementById("loginMsg").innerText="Invalid credentials";
}
}

function logout(){
currentUser=null;
sessionStorage.removeItem("currentUser");
show('login');
}

// --- LEVELS DATA ---
const levels=[];
for(let i=1;i<=25;i++){
levels.push({
title:`Level ${i}`,
content:`This is the content for Level ${i}. Explain ML concept here, give examples, diagrams, or mini demos.`
});
}
let currentLevel=0;

function renderLevels(){
let container=document.getElementById("levelsContainer");
container.innerHTML="";
levels.forEach((l,i)=>{
let btn=document.createElement("button");
btn.className="level-button";
if(progress[currentUser] && progress[currentUser].levelsCompleted && progress[currentUser].levelsCompleted.includes(i)) btn.classList.add("completed");
btn.innerText=l.title;
btn.onclick=()=>{currentLevel=i; showLevel(i);};
container.appendChild(btn);
});
showLevel(currentLevel);
}

function showLevel(i){
document.getElementById("levelContent").innerHTML=`<h3>${levels[i].title}</h3><p>${levels[i].content}</p>`;
if(!progress[currentUser]) progress[currentUser]={levelsCompleted:[],practice:[]};
if(!progress[currentUser].levelsCompleted.includes(i)) progress[currentUser].levelsCompleted.push(i);
localStorage.setItem("progress", JSON.stringify(progress));
renderLevels();
}

function nextLevel(){
if(currentLevel<levels.length-1){currentLevel++; showLevel(currentLevel);}
}
function prevLevel(){
if(currentLevel>0){currentLevel--; showLevel(currentLevel);}
}

// --- PRACTICE DATA ---
const practice=[
{question:"ML is a subset of which field?", options:["AI","DS","Web Dev"], answer:0},
{question:"Which algorithm is used for classification?", options:["Linear Regression","KNN","PCA"], answer:1},
{question:"Gradient Descent helps in?", options:["Optimizing Loss","Sorting","Data Cleaning"], answer:0}
];
let currentPractice=0;

function renderPractice(){
let q=practice[currentPractice];
let container=document.getElementById("practiceContent");
container.innerHTML=`<h3>Q${currentPractice+1}: ${q.question}</h3>`;
q.options.forEach((opt,i)=>{
let btn=document.createElement("button");
btn.innerText=opt;
btn.onclick=()=>{if(i===q.answer){alert("Correct!");}else{alert("Wrong!");} if(!progress[currentUser].practice.includes(currentPractice)) progress[currentUser].practice.push(currentPractice); localStorage.setItem("progress",JSON.stringify(progress));};
container.appendChild(btn);
});
}

function nextPractice(){if(currentPractice<practice.length-1){currentPractice++; renderPractice();}}
function prevPractice(){if(currentPractice>0){currentPractice--; renderPractice();}}

// --- DASHBOARD ---
function renderDashboard(){
const ctx=document.getElementById("dashboardChart").getContext("2d");
let completed=progress[currentUser] && progress[currentUser].levelsCompleted?progress[currentUser].levelsCompleted.length:0;
let practiceDone=progress[currentUser] && progress[currentUser].practice?progress[currentUser].practice.length:0;
new Chart(ctx,{
type:"pie",
data:{
labels:["Levels Completed","Levels Remaining"],
datasets:[{data:[completed,25-completed],backgroundColor:["#0077ff","#e0f7fa"]}]
}
});
}

</script>
</body>
</html>

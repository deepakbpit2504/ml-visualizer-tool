<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ML Learning Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Poppins;background:#eef;margin:0}
nav{background:#fff;padding:10px;text-align:center}
nav a{margin:10px;cursor:pointer;color:#0077ff;font-weight:bold}
section{display:none;padding:20px}
.active{display:block}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px}
button{padding:8px 15px;margin:5px;background:#0077ff;color:#fff;border:none;border-radius:5px;cursor:pointer}
input{padding:8px;margin:5px;width:200px}
img,iframe{max-width:100%;margin-top:10px;border-radius:8px}
</style>
</head>

<body>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('login')">Login</a>
<a onclick="show('explore')">Explore</a>
<a onclick="show('dashboard')">Dashboard</a>
<a onclick="logout()">Logout</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h2>ML Learning Platform</h2>
<div class="card">
Learn Machine Learning step by step with visuals, videos, and real examples.
</div>
<button onclick="show('login')">Get Started</button>
</section>

<!-- LOGIN -->
<section id="login">
<h2>Login / Signup</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="msg"></p>
</section>

<!-- EXPLORE -->
<section id="explore">
<h2>Levels</h2>
<div id="levels"></div>
<div class="card" id="content"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>Progress</h2>
<canvas id="chart"></canvas>
</section>

<script>

let currentUser = sessionStorage.getItem("user");
let progress = JSON.parse(localStorage.getItem("progress")) || {};
let currentLevel = 0;
let chartInstance = null;

// NAV
function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="explore"){
if(!currentUser){ alert("Login first"); show('login'); return;}
renderLevels();
}

if(id==="dashboard"){
renderChart();
}
}

// AUTH
function signup(){
let u=user.value,p=pass.value;
if(!u||!p){msg.innerText="Fill fields";return;}
let users=JSON.parse(localStorage.getItem("users"))||{};
users[u]=p;
localStorage.setItem("users",JSON.stringify(users));
msg.innerText="Signup done";
}

function login(){
let u=user.value,p=pass.value;
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[u]===p){
currentUser=u;
sessionStorage.setItem("user",u);
msg.innerText="Login success";
show('explore');
}else msg.innerText="Wrong credentials";
}

function logout(){
sessionStorage.clear();
currentUser=null;
show('login');
}

// LEVELS (10 DETAILED)
const levels = [

{
title:"Level 1: What is ML",
content:`
<h3>Machine Learning</h3>
<p>ML allows computers to learn from data.</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/66/ML_process.png">
<iframe height="250" src="https://www.youtube.com/embed/ukzFI9rgwfU"></iframe>
`
},

{
title:"Level 2: Types of ML",
content:`
<h3>Types</h3>
<p>Supervised, Unsupervised, Reinforcement</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Machine_learning_types.png">
<iframe height="250" src="https://www.youtube.com/embed/Cr6VqTRO1v0"></iframe>
`
},

{
title:"Level 3: Linear Regression",
content:`
<h3>Linear Regression</h3>
<p>y = mx + b</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Linear_regression.svg">
<iframe height="250" src="https://www.youtube.com/embed/aircAruvnKk"></iframe>
`
},

{
title:"Level 4: Logistic Regression",
content:`
<h3>Logistic Regression</h3>
<p>Used for classification</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Logistic-curve.svg">
<iframe height="250" src="https://www.youtube.com/embed/zM4VZR0px8E"></iframe>
`
},

{
title:"Level 5: Evaluation Metrics",
content:`
<h3>Metrics</h3>
<p>Accuracy, Precision, Recall</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Confusion_matrix.png">
<iframe height="250" src="https://www.youtube.com/embed/85dtiMz9tSo"></iframe>
`
},

{
title:"Level 6: Overfitting",
content:`
<h3>Overfitting</h3>
<p>Model memorizes data</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Overfitting.svg">
<iframe height="250" src="https://www.youtube.com/embed/EehRcPo1WPs"></iframe>
`
},

{
title:"Level 7: Feature Engineering",
content:`
<h3>Feature Engineering</h3>
<p>Transform data into features</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Data_preprocessing.svg">
<iframe height="250" src="https://www.youtube.com/embed/0xVqLJe9_CY"></iframe>
`
},

{
title:"Level 8: Clustering",
content:`
<h3>K-Means</h3>
<p>Grouping data</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/K-means_convergence.gif">
<iframe height="250" src="https://www.youtube.com/embed/4b5d3muPQmA"></iframe>
`
},

{
title:"Level 9: Neural Networks",
content:`
<h3>Neural Networks</h3>
<p>Brain-inspired model</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Colored_neural_network.svg">
<iframe height="250" src="https://www.youtube.com/embed/aircAruvnKk"></iframe>
`
},

{
title:"Level 10: Deep Learning",
content:`
<h3>Deep Learning</h3>
<p>Advanced ML</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Deep_learning.png">
<iframe height="250" src="https://www.youtube.com/embed/6M5VXKLf4D4"></iframe>
`
}

];

function renderLevels(){
let div=document.getElementById("levels");
div.innerHTML="";
levels.forEach((l,i)=>{
let b=document.createElement("button");
b.innerText="Level "+(i+1);
b.onclick=()=>{currentLevel=i;showLevel();}
div.appendChild(b);
});
showLevel();
}

function showLevel(){
let c=document.getElementById("content");
c.innerHTML=levels[currentLevel].content;

// save progress
if(!progress[currentUser]) progress[currentUser]=[];
if(!progress[currentUser].includes(currentLevel))
progress[currentUser].push(currentLevel);

localStorage.setItem("progress",JSON.stringify(progress));
}

function next(){ if(currentLevel<levels.length-1){currentLevel++;showLevel();}}
function prev(){ if(currentLevel>0){currentLevel--;showLevel();}}

// DASHBOARD
function renderChart(){
let done = progress[currentUser]?progress[currentUser].length:0;
let ctx=document.getElementById("chart");

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(ctx,{
type:'pie',
data:{
labels:['Completed','Remaining'],
datasets:[{data:[done,10-done]}]
}
});
}

</script>
</body>
</html>
